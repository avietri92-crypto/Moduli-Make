<form id="myForm">
  <table>
  <tr>Full Name</tr>
  <input type="text" name="user_name" required></tr>
    <tr>E-mail</tr>
  <tr><input type="email" name="user_email" required></tr>
   <tr>Agency Name</tr>
  <tr><input type="text" name="agency_name"></tr>
  <tr><button type="submit">Invia</button></tr>
  </table>
</form>

<script>
document.getElementById('myForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());

  await fetch('https://hook.eu1.make.com/osajyryh5iyx14dc5ms9lvh5mr4jdtew', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  
  alert('Dati inviati istantaneamente!');
});
</script>
