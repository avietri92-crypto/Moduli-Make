<link rel="stylesheet" href="style.css">
<form id="myForm">
 <input type="text" name="name" class="question" id="nme" placeholder=" " required autocomplete="off" >
  <label for="nme"><span>Full Name</span></label>
  <input type="email" name="email" class="question" id="email" placeholder=" " required autocomplete="off" >
  <label for="email"><span>Email</span></label>
   <input type="text" name="agency" class="question" id="agency" placeholder=" " >
  <label for="agency"><span>Agency Name</span></label>
  <input type="submit" value="Submit!" />
</form>

<script>
document.getElementById('myForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());

  await fetch('https://hook.eu1.make.com/osajyryh5iyx14dc5ms9lvh5mr4jdtew', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  
  alert('Dati inviati istantaneamente!');
});
</script>
