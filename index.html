<link rel="stylesheet" href="style.css">
<form id="myForm">
  <table>
  <tr><td>Full Name</td></tr>
      <tr><td><input type="text" name="user_name" required></td></tr>
<tr><td>E-mail</td></tr>
   <tr><td><input type="email" name="user_email" required></td></tr>
  <tr><td>Agency Name</td></tr>
 <tr><td><input type="text" name="agency_name"></td></tr>
  <tr><td><button type="submit">Invia</button></td></tr>
  
  </table>
</form>

<script>
document.getElementById('myForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());

  await fetch('https://hook.eu1.make.com/osajyryh5iyx14dc5ms9lvh5mr4jdtew', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  
  alert('Dati inviati istantaneamente!');
});
</script>
